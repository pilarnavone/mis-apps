<script>
  const firebaseConfig = {
    apiKey: "AIzaSyADfNQH8VC6MgN9T7O6xFpRlr2eN3at65s",
    authDomain: "planificador-docente-b7a6b.firebaseapp.com",
    projectId: "planificador-docente-b7a6b",
    storageBucket: "planificador-docente-b7a6b.firebasestorage.app",
    messagingSenderId: "775763706860",
    appId: "1:775763706860:web:e753b1f2b43c47f680f6c9"
  };
  firebase.initializeApp(firebaseConfig);
  const _auth = firebase.auth();
  const _db   = firebase.firestore();
  const _provider = new firebase.auth.GoogleAuthProvider();

  window._fbSignIn  = () => _auth.signInWithPopup(_provider).catch(e => console.error(e));
  window._fbSignOut = () => _auth.signOut();
  window._fbSave    = async (data) => {
    const user = _auth.currentUser; if(!user) return;
    await _db.collection('bibliotecas').doc(user.uid).set(data);
  };
  window._fbLoad = async () => {
    const user = _auth.currentUser; if(!user) return null;
    const snap = await _db.collection('bibliotecas').doc(user.uid).get();
    return snap.exists ? snap.data() : null;
  };

  // Esperar a que las funciones del script principal estén listas
  window.addEventListener('load', () => {
    _auth.onAuthStateChanged(async (user) => {
      if(user) {
        setAuthUI(true, user.displayName || user.email);
        setSyncing('☁ Sincronizando con la nube...');
        const remoto = await window._fbLoad();
        if(remoto && remoto.books) {
          books  = remoto.books  || INITIAL_BOOKS;
          wishes = remoto.wishes || INITIAL_WISH;
          saveLocal();
          populateFilters();
          renderAll();
          setSyncOk('☁ Datos cargados desde la nube ✓');
        } else {
          await window._fbSave({ books, wishes });
          setSyncOk('☁ Datos locales sincronizados ✓');
        }
      } else {
        setAuthUI(false, '');
        setSyncMsg('Conectá con Google para sincronizar en la nube.');
      }
    });
  });
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f0f0;
    --surface: #ffffff;
    --surface2: #e8e8e8;
    --border: #b0b0b0;
    --border2: #888888;
    --text: #111111;
    --text2: #444444;
    --text3: #777777;
    --accent: #1a5c2e;
    --accent-light: #d4edda;
    --blue: #0a2f6e;
    --blue-light: #cce0ff;
    --blue-border: #0a4db3;
    --amber: #7a4500;
    --amber-light: #fde8b0;
    --success: #1a5c2e;
    --success-bg: #d4edda;
    --radius: 10px;
    --radius-lg: 12px;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }
  .app { max-width: 980px; margin: 0 auto; padding: 36px 44px; }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; padding-bottom:20px; border-bottom:3px solid var(--border); flex-wrap:wrap; gap:12px; }
  .header-left h1 { font-size: 28px; font-weight: 700; color: var(--text); }
  .header-left p { font-size: 15px; color: var(--text2); margin-top: 3px; }
  .auth-btn { display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:var(--radius); border:2px solid var(--border2); background:var(--surface); cursor:pointer; font-size:14px; font-weight:500; color:var(--text); font-family:inherit; transition:all 0.15s; }
  .auth-btn:hover { background: var(--surface2); }
  .auth-btn.connected { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .auth-dot { width:9px; height:9px; border-radius:50%; background:currentColor; }

  /* Sync bar */
  .sync-bar { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:11px 16px; margin-bottom:20px; font-size:13px; color:var(--text2); display:flex; align-items:center; gap:8px; font-weight:500; }
  .sync-bar.syncing { color: var(--blue); border-color: var(--blue-border); }
  .sync-bar.ok { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
  .sync-bar.err { color: #7a0000; border-color: #b30000; background: #fdd0d0; }

  /* Tabs */
  .tabs { display:flex; gap:6px; margin-bottom:24px; }
  .tab { flex:1; padding:11px 8px; font-size:15px; font-weight:600; cursor:pointer; border:2px solid var(--border); background:var(--surface); color:var(--text2); border-radius:var(--radius); transition:all 0.15s; font-family:inherit; }
  .tab.active { background: var(--text); color: #fff; border-color: var(--text); }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  /* Sections */
  .section { display:none; } .section.active { display:block; }

  /* Filters */
  .filters { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .filters input, .filters select { padding:10px 14px; border:2px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); font-size:15px; font-family:inherit; font-weight:500; }
  .filters input { flex:1; min-width:200px; }
  .filters input:focus, .filters select:focus { outline:none; border-color: var(--border2); }
  .count { font-size:13px; color:var(--text3); margin-bottom:10px; font-weight:500; }

  /* Book list */
  .book-list { display:flex; flex-direction:column; gap:8px; max-height:540px; overflow-y:auto; }
  .book-item { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:14px 18px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; cursor:pointer; transition:all 0.12s; }
  .book-item:hover { background:var(--surface2); border-color:var(--border2); }
  .book-title { font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:500px; }
  .book-author { font-size:14px; color:var(--text2); margin-top:3px; }
  .book-meta { display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .badge { font-size:12px; font-weight:600; padding:3px 10px; border-radius:6px; background:var(--surface2); color:var(--text2); white-space:nowrap; border:2px solid var(--border); }
  .badge.year { background:var(--blue-light); color:var(--blue); border-color:var(--blue-border); }

  /* Cards / Forms */
  .card { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:16px; }
  .card h2 { font-size:18px; font-weight:700; margin-bottom:16px; color:var(--text); }
  .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  .form-group label { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.05em; }
  .form-group input, .form-group select { padding:10px 12px; border:2px solid var(--border); border-radius:var(--radius); background:var(--surface2); color:var(--text); font-size:15px; font-family:inherit; }
  .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--border2); }
  .form-actions { display:flex; gap:10px; justify-content:flex-end; }
  .btn { padding:10px 20px; border-radius:var(--radius); border:2px solid var(--border); background:var(--surface2); color:var(--text); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.12s; }
  .btn:hover { background:var(--bg); }
  .btn.primary { background:var(--text); color:#fff; border-color:var(--text); }
  .btn.primary:hover { opacity:0.85; }
  .msg { font-size:13px; font-weight:600; color:var(--accent); margin-top:10px; min-height:20px; }
  .msg.err { color:#7a0000; }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:24px; }
  .stat { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:18px; text-align:center; }
  .stat .n { font-size:32px; font-weight:700; color:var(--text); }
  .stat .l { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.06em; margin-top:5px; }
  .chart-wrap { position:relative; height:280px; margin-bottom:1.5rem; }
  .top-authors { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; }
  .author-row { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:12px 16px; display:flex; align-items:center; gap:12px; }
  .author-n { font-size:24px; font-weight:700; min-width:32px; color:var(--text); }
  .author-name { font-size:14px; color:var(--text2); font-weight:500; }

  /* Wish list */
  .wish-add { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .wish-add input { flex:1; min-width:150px; padding:10px 14px; border:2px solid var(--border); border-radius:var(--radius); background:var(--surface); color:var(--text); font-size:15px; font-family:inherit; }
  .wish-list { display:flex; flex-direction:column; gap:8px; max-height:480px; overflow-y:auto; }
  .wish-item { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .wish-actions { display:flex; gap:8px; flex-shrink:0; }
  .icon-btn { padding:6px 14px; border:2px solid var(--border); border-radius:var(--radius); background:none; cursor:pointer; font-size:14px; font-weight:600; color:var(--text2); font-family:inherit; transition:all 0.12s; }
  .icon-btn:hover { background:var(--surface2); color:var(--text); }
  .icon-btn.ok:hover { color:var(--accent); border-color:var(--accent); }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none; align-items:center; justify-content:center; z-index:50; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--surface); border-radius:var(--radius-lg); padding:28px; max-width:480px; width:90%; max-height:80vh; overflow-y:auto; border:2px solid var(--border2); }
  .modal h2 { font-size:20px; font-weight:700; margin-bottom:16px; padding-right:28px; }
  .modal-close { position:absolute; right:1.5rem; top:1.5rem; background:none; border:none; font-size:22px; cursor:pointer; color:var(--text2); font-weight:700; }
  .modal-field { margin-bottom:10px; font-size:15px; display:flex; gap:10px; }
  .modal-field span { color:var(--text2); flex-shrink:0; min-width:90px; font-weight:600; }
  .empty { text-align:center; padding:3rem; color:var(--text3); font-size:15px; }

  /* Favoritos */
  .star-btn { background:none; border:none; cursor:pointer; font-size:18px; padding:2px 4px; line-height:1; flex-shrink:0; transition:transform 0.12s; }
  .star-btn:hover { transform:scale(1.2); }
  .badge.fav { background:#fff8e1; color:#b8860b; border-color:#f0c040; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
</style>
</head>

  <!-- LEÍDOS -->

    </div>
    <div class="count" id="count"></div>
    <div class="book-list" id="book-list"></div>
  </div>

  <!-- AGREGAR -->
  <div id="tab-agregar" class="section">
    <div class="card">
      <h2>Agregar libro leído</h2>
      <div class="form-grid">
        <div class="form-group"><label>Título *</label><input type="text" id="n-titulo" placeholder="Título"></div>
        <div class="form-group"><label>Autor</label><input type="text" id="n-autor" placeholder="Apellido, Nombre"></div>
        <div class="form-group"><label>Editorial</label><input type="text" id="n-editorial" placeholder="Editorial"></div>
        <div class="form-group"><label>Fecha de lectura</label><input type="date" id="n-fecha"></div>
        <div class="form-group"><label>Formato</label>
          <select id="n-formato">
            <option value="">Sin especificar</option>
            <option>Lo tengo en papel</option><option>Kindle</option>
            <option>Biblioteca</option><option>Préstamo</option>
            <option>PDF</option><option>Google Libros</option><option>Otro</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1"><label>Comentarios</label><textarea id="n-comentarios" placeholder="Notas, quién lo prestó..." rows="3" style="padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:15px;font-family:inherit;resize:vertical;width:100%;"></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="clearForm()">Limpiar</button>
        <button class="btn primary" onclick="addBook()">Guardar libro</button>
      </div>
      <div class="msg" id="add-msg"></div>
    </div>
  </div>

  <!-- QUIERO LEER -->
  <div id="tab-quiero" class="section">
    <div class="wish-add">
      <input type="text" id="w-titulo" placeholder="Título..." onkeydown="if(event.key==='Enter')addWish()">
      <input type="text" id="w-autor" placeholder="Autor..." onkeydown="if(event.key==='Enter')addWish()">
      <button class="btn primary" onclick="addWish()">+ Agregar</button>
    </div>
    <div class="wish-list" id="wish-list"></div>
  </div>

  <!-- ESTADÍSTICAS -->
  <div id="tab-stats" class="section">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card" style="padding-bottom:1rem">
      <h2>Libros por año</h2>
      <div class="chart-wrap"><canvas id="yearChart" role="img" aria-label="Libros leídos por año"></canvas></div>
    </div>
    <div class="card">
      <h2>Autores más leídos</h2>
      <div class="top-authors" id="top-authors"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

let books = [], wishes = [], chart = null;

// ── STORAGE LOCAL ─────────────────────────────────────────────────────────────
function loadLocal() {
  try {
    const b = localStorage.getItem(LS_BOOKS);
    const w = localStorage.getItem(LS_WISH);
    books  = b ? JSON.parse(b) : INITIAL_BOOKS;
    wishes = w ? JSON.parse(w) : INITIAL_WISH;
  } catch(e) {
    books  = INITIAL_BOOKS;
    wishes = INITIAL_WISH;
  }
  if(!localStorage.getItem(LS_BOOKS)) saveLocal();
}
function saveLocal() {
  localStorage.setItem(LS_BOOKS, JSON.stringify(books));
  localStorage.setItem(LS_WISH,  JSON.stringify(wishes));
}

// ── AUTH UI ──────────────────────────────────────────────────────────────────
function toggleAuth() {
  const lbl = document.getElementById('auth-label').textContent;
  if(lbl.startsWith('✓') || lbl === 'Conectado') {
    window._fbSignOut && window._fbSignOut();
  } else {
    window._fbSignIn && window._fbSignIn();
  }
}

function setAuthUI(connected, name) {
  const btn = document.getElementById('auth-btn');
  const lbl = document.getElementById('auth-label');
  if(connected) {
    btn.classList.add('connected');
    lbl.textContent = name ? '✓ ' + name.split(' ')[0] : 'Conectado';
  } else {
    btn.classList.remove('connected');
    lbl.textContent = 'Conectar con Google';
  }
}

// ── SAVE (local + nube) ───────────────────────────────────────────────────────
let _saveTimer = null;
async function save() {
  saveLocal();
  if(window._fbSave) {
    clearTimeout(_saveTimer);
    setSyncing('Guardando en la nube...');
    _saveTimer = setTimeout(async () => {
      await window._fbSave({ books, wishes });
      setSyncOk('☁ Guardado en la nube ✓');
    }, 1500);
  }
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='stats') renderStats();
  if(name==='favoritos') renderFavoritos();
  if(name==='pilar') renderPilar();
}

// ── FAVORITOS ────────────────────────────────────────────────────────────────
async function toggleFav(id, e) {
  if(e) e.stopPropagation();
  const b = books.find(x=>x.id===id); if(!b) return;
  b.favorito = !b.favorito;
  await save();
  renderList();
  renderFavoritos();
  // actualizar modal si está abierto
  const modalBg = document.getElementById('modal-bg');
  if(modalBg.classList.contains('open')) openModal(id);
}

function renderFavoritos() {
  const q = (document.getElementById('search-fav')||{value:''}).value.toLowerCase();
  const favs = books.filter(b => b.favorito && (!q || b.titulo.toLowerCase().includes(q) || (b.autor||'').toLowerCase().includes(q)))
    .sort((a,b)=>(b.anio||0)-(a.anio||0)||(b.id||0)-(a.id||0));
  document.getElementById('count-fav').textContent = `${favs.length} favorito${favs.length!==1?'s':''}`;
  const el = document.getElementById('fav-list');
  if(!favs.length) { el.innerHTML='<div class="empty">⭐ Todavía no marcaste ningún favorito.</div>'; return; }
  el.innerHTML = favs.map(b=>`
    <div class="book-item" onclick="openModal(${b.id})">
      <div style="flex:1;min-width:0">
        <div class="book-title">${b.titulo}</div>
        <div class="book-author">${b.autor||'<em>Sin autor</em>'}</div>
      </div>
      <div class="book-meta">
        <button class="star-btn" onclick="toggleFav(${b.id},event)" title="Quitar de favoritos">⭐</button>
        ${b.anio?`<span class="badge year">${b.anio}</span>`:''}
      </div>
    </div>`).join('');
}

function renderPilar() {
  const q = (document.getElementById('search-pilar')||{value:''}).value.toLowerCase();
  const ya = (document.getElementById('f-anio-pilar')||{value:''}).value;
  const papel = books.filter(b => {
    const esPapel = b.formato === 'Lo tengo en papel';
    const mq = !q || b.titulo.toLowerCase().includes(q) || (b.autor||'').toLowerCase().includes(q);
    const ma = !ya || String(b.anio)===ya;
    return esPapel && mq && ma;
  }).sort((a,b)=>(b.anio||0)-(a.anio||0)||(b.id||0)-(a.id||0));

  // populate year filter
  const sel = document.getElementById('f-anio-pilar');
  if(sel) {
    const aniosAll = [...new Set(books.filter(b=>b.formato==='Lo tengo en papel').map(b=>b.anio).filter(Boolean))].sort((a,b)=>b-a);
    const cur = sel.value;
    sel.innerHTML = '<option value="">Todos los años</option>';
    aniosAll.forEach(a=>{ const o=document.createElement('option'); o.value=a; o.textContent=a; if(String(a)===cur) o.selected=true; sel.appendChild(o); });
  }

  document.getElementById('count-pilar').textContent = `${papel.length} libro${papel.length!==1?'s':''} en papel`;
  const el = document.getElementById('pilar-list');
  if(!papel.length) { el.innerHTML='<div class="empty">No se encontraron libros en papel.</div>'; return; }
  el.innerHTML = papel.map(b=>`
    <div class="book-item" onclick="openModal(${b.id})">
      <div style="flex:1;min-width:0">
        <div class="book-title">${b.titulo}</div>
        <div class="book-author">${b.autor||'<em>Sin autor</em>'}</div>
      </div>
      <div class="book-meta">
        <button class="star-btn" onclick="toggleFav(${b.id},event)" title="${b.favorito?'Quitar favorito':'Marcar favorito'}">${b.favorito?'⭐':'☆'}</button>
        ${b.anio?`<span class="badge year">${b.anio}</span>`:''}
      </div>
    </div>`).join('');
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
const MESES_NOMBRE = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function populateFilters() {
  const anios = [...new Set(books.map(b=>b.anio).filter(Boolean))].sort((a,b)=>b-a);
  const sel = document.getElementById('f-anio');
  sel.innerHTML = '<option value="">Todos los años</option>';
  anios.forEach(a=>{ const o=document.createElement('option'); o.value=a; o.textContent=a; sel.appendChild(o); });
  const fmts = [...new Set(books.map(b=>b.formato).filter(Boolean))].sort();
  const sel2 = document.getElementById('f-fmt');
  sel2.innerHTML = '<option value="">Todos los formatos</option>';
  fmts.forEach(f=>{ const o=document.createElement('option'); o.value=f; o.textContent=f; sel2.appendChild(o); });
}

function renderList() {
  const q   = document.getElementById('search').value.toLowerCase();
  const ya  = document.getElementById('f-anio').value;
  const yf  = document.getElementById('f-fmt').value;
  const filtered = books.filter(b => {
    const mq = !q  || b.titulo.toLowerCase().includes(q) || (b.autor||'').toLowerCase().includes(q);
    const ma = !ya || String(b.anio)===ya;
    const mf = !yf || b.formato===yf;
    return mq && ma && mf;
  }).sort((a,b) => (b.anio||0) - (a.anio||0) || (b.id||0) - (a.id||0));
  document.getElementById('count').textContent = `${filtered.length} libro${filtered.length!==1?'s':''} encontrado${filtered.length!==1?'s':''}`;
  const el = document.getElementById('book-list');
  if(!filtered.length) { el.innerHTML='<div class="empty">No se encontraron libros</div>'; return; }
  el.innerHTML = filtered.map(b=>`
    <div class="book-item" onclick="openModal(${b.id})">
      <div style="flex:1;min-width:0">
        <div class="book-title">${b.titulo}</div>
        <div class="book-author">${b.autor||'<em>Sin autor</em>'}</div>
      </div>
      <div class="book-meta">
        <button class="star-btn" onclick="toggleFav(${b.id},event)" title="${b.favorito?'Quitar favorito':'Marcar favorito'}">${b.favorito?'⭐':'☆'}</button>
        ${b.formato?`<span class="badge">${b.formato.length>14?b.formato.substring(0,14)+'…':b.formato}</span>`:''}
        ${b.anio?`<span class="badge year">${b.anio}</span>`:''}
      </div>
    </div>`).join('');
}

function openModal(id) {
  const b = books.find(x=>x.id===id); if(!b) return;
  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:10px;padding-right:28px;">
      <h2 style="flex:1;margin:0;padding:0">${b.titulo}</h2>
      <button class="star-btn" onclick="toggleFav(${b.id},event)" title="${b.favorito?'Quitar favorito':'Marcar favorito'}" style="font-size:22px;margin-top:2px;">${b.favorito?'⭐':'☆'}</button>
    </div>
    ${b.autor?`<div class="modal-field"><span>Autor</span>${b.autor}</div>`:''}
    ${b.editorial?`<div class="modal-field"><span>Editorial</span>${b.editorial}</div>`:''}
    ${(b.fecha||b.anio)?`<div class="modal-field"><span>Fecha leído</span>${b.fecha ? new Date(b.fecha+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'}) : (b.mes?MESES_NOMBRE[b.mes]+' ':'')+b.anio}</div>`:''}
    ${b.formato?`<div class="modal-field"><span>Formato</span>${b.formato}</div>`:''}
    ${b.comentarios?`<div class="modal-field"><span>Comentarios</span>${b.comentarios}</div>`:''}
    <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)">
      <button class="btn" style="color:#dc2626;border-color:#fca5a5" onclick="deleteBook(${b.id})">Eliminar de la lista</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

async function deleteBook(id) {
  if(!confirm('¿Eliminar este libro de la lista de leídos?')) return;
  books = books.filter(b=>b.id!==id);
  await save();
  populateFilters();
  renderList();
  closeModal();
}

// ── ADD BOOK ──────────────────────────────────────────────────────────────────
async function addBook() {
  const titulo = document.getElementById('n-titulo').value.trim();
  if(!titulo) { showMsg('add-msg','El título es obligatorio.', true); return; }
  const book = {
    id: Date.now(),
    titulo,
    autor: document.getElementById('n-autor').value.trim(),
    editorial: document.getElementById('n-editorial').value.trim(),
    fecha: document.getElementById('n-fecha').value||'',
    anio: document.getElementById('n-fecha').value ? parseInt(document.getElementById('n-fecha').value.split('-')[0]) : new Date().getFullYear(),
    mes: document.getElementById('n-fecha').value ? parseInt(document.getElementById('n-fecha').value.split('-')[1]) : null,
    formato: document.getElementById('n-formato').value,
    comentarios: document.getElementById('n-comentarios').value.trim()
  };
  books.push(book);
  await save();
  populateFilters();
  renderList();
  clearForm();
  showMsg('add-msg','¡Libro guardado!', false);
}
function clearForm() {
  ['n-titulo','n-autor','n-editorial','n-fecha','n-comentarios'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-formato').value='';
}
function showMsg(id, txt, isErr) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = 'msg' + (isErr?' err':'');
  setTimeout(()=>el.textContent='', 3000);
}

// ── WISH LIST ─────────────────────────────────────────────────────────────────
function renderWish() {
  const el = document.getElementById('wish-list');
  if(!wishes.length) { el.innerHTML='<div class="empty">Tu lista está vacía</div>'; return; }
  el.innerHTML = wishes.map(w=>`
    <div class="wish-item">
      <div>
        <div style="font-size:14px;font-weight:500">${w.titulo}</div>
        ${w.autor?`<div style="font-size:12px;color:var(--text2)">${w.autor}</div>`:''}
        ${w.comentario?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${w.comentario}</div>`:''}
      </div>
      <div class="wish-actions">
        <button class="icon-btn ok" onclick="markRead(${w.id})" title="Marcar como leído">✓</button>
        <button class="icon-btn" onclick="removeWish(${w.id})" title="Eliminar">✕</button>
      </div>
    </div>`).join('');
}

async function addWish() {
  const t = document.getElementById('w-titulo').value.trim();
  if(!t) return;
  wishes.push({id:Date.now(), titulo:t, autor:document.getElementById('w-autor').value.trim(), editorial:'', comentario:''});
  await save();
  document.getElementById('w-titulo').value='';
  document.getElementById('w-autor').value='';
  renderWish();
}

async function removeWish(id) {
  wishes = wishes.filter(w=>w.id!==id);
  await save();
  renderWish();
}

async function markRead(id) {
  const w = wishes.find(x=>x.id===id); if(!w) return;
  // Check for duplicate (same title, case-insensitive)
  const exists = books.some(b => b.titulo.toLowerCase().trim() === w.titulo.toLowerCase().trim());
  if(exists) {
    if(!confirm(`"${w.titulo}" ya está en tu lista de leídos. ¿Igual lo eliminás de "Quiero leer"?`)) return;
  } else {
    books.push({id:Date.now(), titulo:w.titulo, autor:w.autor, editorial:w.editorial||'', anio:new Date().getFullYear(), formato:'', comentarios:''});
  }
  wishes = wishes.filter(x=>x.id!==id);
  await save();
  populateFilters();
  renderList();
  renderWish();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const byAnio={};
  books.forEach(b=>{ if(b.anio) byAnio[b.anio]=(byAnio[b.anio]||0)+1; });
  const anios=Object.keys(byAnio).sort();
  const counts=anios.map(a=>byAnio[a]);
  const max=anios.length?anios.reduce((a,b)=>byAnio[b]>byAnio[a]?b:a,anios[0]):'-';
  const avg=anios.length?Math.round(books.length/anios.length):0;
  const ac={};
  books.forEach(b=>{ if(b.autor){ const k=b.autor.trim(); ac[k]=(ac[k]||0)+1; } });
  const top=Object.entries(ac).sort((a,b)=>b[1]-a[1]).slice(0,8);

  document.getElementById('stats-grid').innerHTML=`
    <div class="stat"><div class="n">${books.length}</div><div class="l">Libros leídos</div></div>
    <div class="stat"><div class="n">${anios.length}</div><div class="l">Años registrados</div></div>
    <div class="stat"><div class="n">${avg}</div><div class="l">Promedio / año</div></div>
    <div class="stat"><div class="n">${max!=='-'?byAnio[max]:'-'}</div><div class="l">Récord (${max})</div></div>
    <div class="stat"><div class="n">${wishes.length}</div><div class="l">Por leer</div></div>
  `;

  if(chart) chart.destroy();
  const isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  chart = new Chart(document.getElementById('yearChart'),{
    type:'bar',
    data:{labels:anios, datasets:[{label:'Libros', data:counts,
      backgroundColor: isDark?'#3b82f6':'#2563eb',
      borderRadius:4, borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:11},color:isDark?'#aeaeb2':'#666'},
           grid:{display:false}},
        y:{ticks:{stepSize:5,color:isDark?'#aeaeb2':'#666'},
           grid:{color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)'}}
      }
    }
  });

  document.getElementById('top-authors').innerHTML=top.map(([a,c])=>`
    <div class="author-row">
      <div class="author-n">${c}</div>
      <div class="author-name">${a}</div>
    </div>`).join('');
}

// ── RENDER ALL ─────────────────────────────────────────────────────────────────
function renderAll() {
  populateFilters();
  renderList();
  renderWish();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadLocal();
renderAll();
</script>
